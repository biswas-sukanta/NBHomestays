spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

# Disable data seeders
application:
  data-seeding:
    enabled: false

logging:
  level:
    com.nbh.backend: DEBUG
