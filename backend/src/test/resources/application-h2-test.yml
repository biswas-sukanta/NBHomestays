spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS VARCHAR\;
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379

# Disable data seeders
application:
  data-seeding:
    enabled: false
  jobs:
    async:
      enabled: false
    vibe-score:
      enabled: false
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000
      refresh-token:
        expiration: 604800000

media:
  staging:
    cleanup:
      scheduler-enabled: false

logging:
  level:
    com.nbh.backend: DEBUG
