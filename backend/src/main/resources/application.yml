spring:
  threads:
    virtual:
      enabled: true
  application:
    name: nb-homestays-backend
  datasource:
    # Strict binding: No default values to ensure fail-fast on missing environment variables
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 25
      connection-timeout: 10000
      schema: public
      transaction-isolation: TRANSACTION_READ_COMMITTED
      idle-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 0 # Prevent crash if DB is temporarily slow
      keepalive-time: 30000
      max-lifetime: 120000
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none # Temporary workaround until entity-schema alignment migration is created
    properties:
      hibernate:
        default_schema: public
        generate_statistics: false
        format_sql: true
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    out-of-order: false
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false
    schemas: public
    connect-retries: 5
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  error:
    include-message: always
    include-stacktrace: always
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000
      refresh-token:
        expiration: 604800000

homestay:
  signals:
    popularInquiryThreshold: 5
    highDemandViewThreshold: 200

imagekit:
  max-file-size-bytes: 5242880
  allowed-content-types: image/jpeg,image/png,image/webp
