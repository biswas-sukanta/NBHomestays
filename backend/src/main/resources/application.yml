spring:
  threads:
    virtual:
      enabled: true
  application:
    name: nb-homestays-backend
  datasource:
    # Strict binding: No default values to ensure fail-fast on missing environment variables
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 25
      connection-timeout: 2000
      idle-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 0 # Prevent crash if DB is temporarily slow
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate # Hard-coded to validate as backup
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    out-of-order: false
    baseline-on-migrate: true
    connect-retries: 5
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000
      refresh-token:
        expiration: 604800000

homestay:
  signals:
    popularInquiryThreshold: 5
    highDemandViewThreshold: 200
