<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="kanchenGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="40%" stop-color="#94A3B8"/>
      <stop offset="70%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="goldenPeak" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Kanchenjunga - five peaks -->
  <path d="M4 56 L16 28 L24 36 L32 4 L40 36 L48 28 L60 56 Z" fill="url(#kanchenGrad)" stroke="#334155" stroke-width="2"/>
