  <path d="M20 20 Q24 16 28 20" stroke="#DC2626" stroke-width="1" fill="none"/>
  <path d="M36 20 Q40 16 44 20" stroke="#2563EB" stroke-width="1" fill="none"/>
  <path d="M24 24 Q28 20 32 24" stroke="#FBBF24" stroke-width="1" fill="none"/>
  <path d="M32 24 Q36 20 40 24" stroke="#059669" stroke-width="1" fill="none"/>
