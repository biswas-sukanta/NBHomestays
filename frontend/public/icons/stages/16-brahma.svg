<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="lotusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="70%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>
  <!-- Sacred lotus base -->
  <ellipse cx="32" cy="52" rx="20" ry="6" fill="#0EA5E9" opacity="0.3"/>
  <!-- Lotus petals outer -->
  <path d="M20 48 Q24 32 32 36 Q40 32 44 48" fill="#FDE68A" stroke="#F59E0B" stroke-width="1"/>
  <path d="M12 44 Q20 28 32 32 Q44 28 52 44" fill="#FCD34D" stroke="#F59E0B" stroke-width="1"/>
  <!-- Lotus petals inner -->
  <path d="M24 40 Q28 28 32 30 Q36 28 40 40" fill="url(#lotusGrad)" stroke="#D97706" stroke-width="1"/>
  <!-- Center -->
  <circle cx="32" cy="32" r="6" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
  <!-- Divine glow -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#FCD34D" stroke-width="0.5" opacity="0.3"/>
  <!-- OM symbol in center -->
  <text x="32" y="36" text-anchor="middle" font-size="8" fill="#78350F">ॐ</text>
  <!-- Water ripples -->
  <ellipse cx="32" cy="56" rx="24" ry="4" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
</svg>
