<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="leopardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Leopard body -->
  <ellipse cx="32" cy="40" rx="22" ry="12" fill="url(#leopardGrad)" stroke="#92400E" stroke-width="2"/>
  <!-- Head -->
  <circle cx="52" cy="36" r="10" fill="url(#leopardGrad)" stroke="#92400E" stroke-width="2"/>
  <!-- Ears -->
  <circle cx="46" cy="28" r="4" fill="#D97706" stroke="#92400E" stroke-width="1"/>
  <circle cx="56" cy="28" r="4" fill="#D97706" stroke="#92400E" stroke-width="1"/>
  <!-- Spots -->
  <circle cx="20" cy="38" r="3" fill="#78350F"/>
  <circle cx="32" cy="42" r="2.5" fill="#78350F"/>
  <circle cx="40" cy="36" r="2" fill="#78350F"/>
  <circle cx="28" cy="44" r="2" fill="#78350F"/>
  <circle cx="48" cy="34" r="1.5" fill="#78350F"/>
  <circle cx="54" cy="40" r="1.5" fill="#78350F"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="34" rx="2" ry="2.5" fill="#059669"/>
  <ellipse cx="56" cy="34" rx="2" ry="2.5" fill="#059667"/>
  <circle cx="48" cy="34" r="1" fill="#1C1917"/>
  <circle cx="56" cy="34" r="1" fill="#1C1917"/>
  <!-- Nose -->
  <ellipse cx="52" cy="40" rx="2" ry="1.5" fill="#1C1917"/>
  <!-- Tail -->
  <path d="M10 40 Q4 30 8 24" stroke="#D97706" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="8" cy="24" r="3" fill="#78350F"/>
  <!-- Mountain background -->
  <path d="M0 56 L16 40 L28 48 L40 36 L52 44 L64 56" stroke="#64748B" stroke-width="1" fill="none"/>
</svg>
