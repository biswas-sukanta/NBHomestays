  <path d="M52 30 Q56 20 60 24" stroke="#A8A29E" stroke-width="3" fill="none"/>
  <!-- Eyes -->
  <circle cx="46" cy="34" r="2" fill="#FEF3C7"/>
  <circle cx="50" cy="34" r="2" fill="#FEF3C7"/>
  <!-- Legs -->
  <rect x="20" y="50" width="4" height="8" fill="#1C1917"/>
  <rect x="28" y="50" width="4" height="8" fill="#1C1917"/>
  <rect x="36" y="50" width="4" height="8" fill="#1C1917"/>
  <rect x="40" y="50" width="4" height="8" fill="#1C1917"/>
  <!-- Snow ground -->
  <ellipse cx="32" cy="60" rx="28" ry="4" fill="#E2E8F0"/>
  <!-- Snowflakes -->
